jwt:
  accessKey: ${ACCESS_KEY}
  refreshKey: ${REFRESH_KEY}
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useUnicode=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_EMAIL}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    mongodb:
      uri: ${MONGO_URI}
      username: ${MONGO_USERNAME}
      password: ${MONGO_PASSWORD}
    redis:
      repositories:
        enabled: false

  redis:
    host: 127.0.0.1
    port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      
aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION}
  credentials:
    access-key: ${AWS_IAM_ACCESS_KEY}
    secret-key: ${AWS_IAM_SECRET_KEY}
  cloudfront:
    domain: ${AWS_CLOUD_FRONT}

server:
  address: 0.0.0.0
  port: 8080
