jwt :
  accessKey : ${ACCESS_KEY}
  refreshKey : ${REFRESH_KEY}
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}?useUnicode=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_EMAIL}
    password: ${SMTP_PASSWORD}
    properties:
       mail:
        smtp:
          auth: true
          starttls:
            enable: true

  file:
    base-path: ///Users/choiseonjae/Desktop/PetApp

  dog:
    profile:
      image:
        upload: /Users/choiseonjae/Desktop/PetApp/profiles
    post:
      image:
        upload: /Users/choiseonjae/Desktop/PetApp/posts
    member:
      image:
        upload: /Users/choiseonjae/Desktop/PetApp/members
  data:
    mongodb:
      uri: ${MONGO_URI}

  redis:
    host: 127.0.0.1
    port: 6379

server:
  address: 0.0.0.0
  port: 8080
