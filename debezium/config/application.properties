debezium.sink.type=rabbitmq
debezium.sink.rabbitmq.connection.host=rabbitmq
debezium.sink.rabbitmq.connection.port=${RABBITMQ_PORT}
debezium.sink.rabbitmq.connection.username=${RABBITMQ_USERNAME}
debezium.sink.rabbitmq.connection.password=${RABBITMQ_PASSWORD}
debezium.sink.rabbitmq.exchange=ex.main
#key ?? ??? ?? ??
debezium.sink.rabbitmq.routingKey.source=key
# converter
#schema ?? ?? ???? key? ???? ?? ??
debezium.format.key=simplestring
debezium.source.value.converter=org.apache.kafka.connect.json.JsonConverter
debezium.source.value.converter.schemas.enable=false
#debezium? ???? ?? ?? ??? ????, ?? ??? ???? ???? ?????? ????? ????? ?? ??
debezium.source.extended.headers.enabled=false
# smt
#outbox?? ???? smt ??
debezium.source.transforms=outbox
#?? outbox smt ??
debezium.source.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
#id ??? ??? id? ??
debezium.source.transforms.outbox.table.field.event.id=id
#routingKey ??? ??? ?? ??
debezium.source.transforms.outbox.table.field.event.key=routing_key
#?? ???? ? ???
debezium.source.transforms.outbox.table.field.event.payload=payload
#??? ?? ??? ?? ??
debezium.source.transforms.outbox.route.by.field=routing_key
#id?? ??(envlope: ?? ??? ??)
debezium.source.transforms.outbox.table.fields.additional.placement=id:envelope
#??? ??? ??? ???? ?? ??
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
#??? ??? ??? ?? ??
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
# mysql
debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
debezium.source.database.hostname=mysql
debezium.source.database.port=${MYSQL_PORT}
debezium.source.database.user=${MYSQL_USER}
debezium.source.database.password=${MYSQL_ROOT_PASSWORD}
debezium.source.database.server.id=${DEBEZIUM_SOURCE_DATABASE_SERVER_ID}
#????? ??? ??, outbox_event ???? ????? ????
debezium.source.table.include.list=${MYSQL_DATABASE}.outbox_event
#?? ??? ??
debezium.source.topic.prefix=outbox
#?? ??? ??, ??? ?? 1000?? ???? ??(???? 2048)
debezium.source.max.batch.size=1000
#0.5???
debezium.source.poll.interval.ms=500
#?? ?? ? debeizium ?? ??
debezium.source.event.processing.failure.handling.mode=fail
#??? ?? ??? ??? ???? ?? ??
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
#??? ?? ??? ??? ?? ??
debezium.source.schema.history.internal.file.filename=/debezium/data/history.dat
#??? ?? ???? ??? ???? ??? ??, ??? ?? ???? ????? ???? ???? false? ???? ???? ??? ??? ??
debezium.source.include.schema.changes=false
#??? ??
debezium.source.snapshot.mode=initial
