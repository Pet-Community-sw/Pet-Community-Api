services:
  nginx:
    image: nginx:latest
    container_name: pet-app-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - es01
      - es02
      - es03

  mysql:
    image: mysql:8.0
    container_name: pet-app-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:latest
    container_name: pet-app-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pet-app-redis
    restart: always
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: pet-app-es01
    environment:
      - node.name=es01
      - cluster.name=pet-cluster
      - discovery.seed_hosts=es02,es03 #재배포시 다른 노드들도 추가해줘야함.
      - cluster.initial_master_nodes=es01,es02,es03 # 초기 마스터 노드 설정, 재배포시 노드 추가해서 초기 마스터노드가 자기뿐만 아닌 클러스터에 있는 모든 노드를 넣고 재배포해야함.
      - xpack.security.enabled=false #비번 없이 접속하기 위해 false로 설정
      - ES_JAVA_OPTS=-Xms256m -Xmx256m #힙 메모리 설정 es는 jvm 기반이라 메모리 설정 필요
    ports:
      - "9200:9200"
    volumes:
      - es-data01:/usr/share/elasticsearch/data

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: pet-app-es02
    environment:
      - node.name=es02
      - cluster.name=pet-cluster
      - discovery.seed_hosts=es01,es03 # 클러스터 내 다른 노드들 설정 부트 당시 어느 노드로가야하는지
      - cluster.initial_master_nodes=es01 #운영중 노드 추가이기 때문에 초기 노드는 그대로 설정
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9201:9200"
    volumes:
      - es-data02:/usr/share/elasticsearch/data


  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: pet-app-es03
    environment:
      - node.name=es03
      - cluster.name=pet-cluster
      - discovery.seed_hosts=es01,es02
      - cluster.initial_master_nodes=es01
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9202:9200"
    volumes:
      - es-data03:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pet-app-rabbitmq
    restart: always
    ports:
      - "5672:5672"# RabbitMQ 서버 포트
      - "15672:15672"# 관리 UI 포트
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE} # 클러스터링 시 동일한 값으로 설정
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 10

  debezium:
    env_file: # 환경변수 파일을 사용하여 설정값을 관리할 수 있도록 env_file 옵션 추가
      - .env
    image: quay.io/debezium/server:3.4
    container_name: pet-app-debezium
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./debezium/config:/debezium/conf
      - ./debezium/data:/debezium/data

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  uploads-data:
  es-data01:
  es-data02:
  es-data03:
  rabbitmq-data:


